monitor=,preferred,auto,auto

#exec-once = swww-daemon --format xrgb
#exec-once = kitty +kitten panel --edge=background btop
exec-once = sudo xremap ~/.config/xremap/config.yml
exec-once = sudo modprobe v4l2loopback
exec-once = [workspace 1 silent] kitty
exec-once = [workspace special:magic silent] flatpak run io.github.zen_browser.zen

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,23
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,23

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}
