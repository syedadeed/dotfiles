source=~/.config/hypr/system.conf
source=~/.config/hypr/color_palette.conf
source=~/.config/hypr/blur.conf
source=~/.config/hypr/animations.conf
source=~/.config/hypr/gestures.conf

general {
    border_size = 2
    col.active_border = rgb($col1) rgb($col2) rgb($col3) rgb($col4) 45deg
    col.inactive_border = rgb($col5)

    gaps_in = 4
    gaps_out = 10

    layout = dwindle

    resize_on_border = false
}

decoration {
    rounding = 20
    
    active_opacity = 1.0
    fullscreen_opacity = 1.0
    inactive_opacity = 0.8
    
    dim_inactive = true
    dim_strength = 0.1
    
    drop_shadow = false
}

group{
    col.border_active = rgb($col1) rgb($col2) rgb($col3) rgb($col4) 45deg
    col.border_locked_active = rgb($col1) rgb($col2) rgb($col3) rgb($col4) 45deg
    col.border_inactive = rgb($col5)
    col.border_locked_inactive = rgb($col5)

    groupbar{
        enabled = true
        render_titles = false
        height = 2
        gradients = false
        
        col.active = rgb($col6)
        
        col.locked_active = rgb($col7)
        
        col.inactive = rgb($col8)
        col.locked_inactive = rgb($col8)
    }
}

dwindle {
    preserve_split = true
    no_gaps_when_only = 1
}

misc{
    disable_hyprland_logo = true
    background_color = rgb(000000)
#    enable_swallow = true
#    swallow_regex = ^kitty$
    new_window_takes_over_fullscreen = 2
}

cursor{
    inactive_timeout = 5
}

#Drop Down terminal config
windowrule=float,drop_down
windowrule=move 0 0,drop_down
windowrule=size 100% 25%,drop_down
windowrule=rounding 0,drop_down
windowrule=noborder,drop_down

workspace = w[t1], gapsout:0, bordersize:0, rounding:0
